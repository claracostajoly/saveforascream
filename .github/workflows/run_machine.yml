name: Machine à Oublier (y=y2)

on:
  schedule:
    # S'exécute toutes les 6 heures (tu peux changer la fréquence)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permet de lancer la machine manuellement pour tester

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy librosa soundfile

    - name: Run Machine à Oublier
      run: python content/y-y2/script.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'actions-user'
        git config --global user.email 'actions@github.com'
        git add content/y-y2/outputs/*.wav
        git commit -m "y=y2 : substitution et oubli algorithmique" || echo "No changes to commit"
        git push
