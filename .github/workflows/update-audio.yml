name: Dead Prayer Machine

on:
  schedule:
    - cron: '*/5 * * * *' # S'exécute toutes les 5 minutes
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install numpy librosa soundfile

    - name: Run Machine
      run: python content/dead_prayer_machine/script.py

    - name: Commit and push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add content/dead_prayer_machine/outputs/latest.wav
        git commit -m "Dead Prayer: mutation" || exit 0
        git push
