<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>oeuvre_template</title>
  <style>
    :root { 
      --bg: #000; 
      --fg: #888; 
    }

    html, body {
      margin: 0; 
      background: var(--bg); 
      color: var(--fg);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      cursor: crosshair; 
      -webkit-font-smoothing: antialiased; 
      -moz-osx-font-smoothing: grayscale;
      /* Empêche le rebond du scroll sur mobile pour une sensation plus rigide */
      overscroll-behavior: none;
    }

    main { 
      max-width: 680px; 
      margin: 250px auto 200px; 
      padding: 0 30px; 
    }

    figure { 
      margin: 140px 0; 
      width: 100%; 
    }

    img, video { 
      width: 100%; 
      height: auto; 
      display: block; 
      background: #0a0a0a; 
    }

    audio { 
      width: 100%; 
      margin-top: 10px; 
      filter: invert(100%) hue-rotate(180deg) brightness(0.6); 
    }
  </style>
</head>
<body>

  <main>
    <figure>
      <img src="CHEMIN_VERS_TON_IMAGE.jpg" alt="description">
    </figure>

    <figure>
      <video playsinline loop muted autoplay>
        <source src="CHEMIN_VERS_TA_VIDEO.mp4" type="video/mp4">
      </video>
    </figure>

    <figure>
      <audio controls>
        <source src="CHEMIN_VERS_TON_SON.mp3" type="audio/mpeg">
      </audio>
    </figure>
  </main>

  <script>
    let clickTimer = null;

    // NAVIGATION SOURIS
    document.addEventListener('click', (e) => {
      // Sécurité : ne pas naviguer si on clique sur les contrôles média
      if (e.target.tagName === 'VIDEO' || e.target.tagName === 'AUDIO' || e.target.closest('audio')) return;

      if (clickTimer === null) {
        clickTimer = setTimeout(() => {
          clickTimer = null;
          // 1 CLIC : Retour à la page précédente (Nébuleuse)
          window.history.back(); 
        }, 300);
      } else {
        clearTimeout(clickTimer);
        clickTimer = null;
        // 2 CLICS : Aller vers la Note
        window.location.href = "note.html"; 
      }
    });

    // NAVIGATION MOBILE (TOUCH)
    let lastTap = 0;
    document.addEventListener('touchend', (e) => {
      if (e.target.tagName === 'VIDEO' || e.target.tagName === 'AUDIO' || e.target.closest('audio')) return;

      const currentTime = new Date().getTime();
      const tapLength = currentTime - lastTap;
      
      if (tapLength < 300 && tapLength > 0) {
        // DOUBLE TAP : Aller vers la Note
        window.location.href = "note.html";
        e.preventDefault(); // Empêche le zoom auto du navigateur
      }
      lastTap = currentTime;
    });
  </script>
</body>
</html>
