<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>After / Without</title>
    <style>
        body {
            background-color: #000;
            color: #444;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            cursor: pointer; /* Indique qu'il faut cliquer */
        }
        #status {
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: opacity 1s;
        }
        .instruction {
            color: #222;
            margin-top: 20px;
            font-size: 10px;
        }
    </style>
</head>
<body>

    <div id="status">AFTER / WITHOUT</div>
    <div class="instruction" id="hint">cliquer pour initier le vide</div>

    <script>
        let audioCtx;

        // On attend un clic pour démarrer l'AudioContext (sécurité navigateur)
        document.body.addEventListener('click', () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                startTheVoid();
                document.getElementById('hint').style.opacity = '0';
                document.getElementById('status').style.color = '#888';
            }
        });

        function startTheVoid() {
            const now = audioCtx.currentTime;

            // 1. SOURCE : EROSION NOISE
            const bufferSize = audioCtx.sampleRate * 4;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) { 
                data[i] = (Math.random() * 2 - 1) * 0.5; 
            }
            
            const source = audioCtx.createBufferSource();
            source.buffer = buffer; 
            source.loop = true;

            const erosionFilter = audioCtx.createBiquadFilter();
            erosionFilter.type = "lowpass";
            erosionFilter.frequency.value = 350; 

            // 2. RÉSEAU DE RÉVERBÉRATION
            const verbGains = [0.031, 0.057, 0.083, 0.113].map(t => {
                const d = audioCtx.createDelay();
                d.delayTime.value = t;
                const f = audioCtx.createGain();
                f.gain.value = 0.85; 
                return {d, f};
            });

            // 3. COMPRESSEUR DE MASSE
            const compressor = audioCtx.createDynamicsCompressor();
            compressor.threshold.setValueAtTime(-40, now);
            compressor.ratio.setValueAtTime(12, now);
            compressor.attack.setValueAtTime(0.01, now);

            // 4. PROTECTION FINALE
            const limiter = audioCtx.createDynamicsCompressor();
            limiter.threshold.setValueAtTime(-3.0, now);
            limiter.ratio.setValueAtTime(20, now);

            const makeupGain = audioCtx.createGain();
            makeupGain.gain.setValueAtTime(0, now);
            makeupGain.gain.linearRampToValueAtTime(0.8, now + 6); 

            // --- ROUTAGE ---
            source.connect(erosionFilter);
            verbGains.forEach(node => {
                erosionFilter.connect(node.d);
                node.d.connect(node.f);
                node.f.connect(node.d); 
                node.d.connect(compressor);
            });

            compressor.connect(makeupGain);
            makeupGain.connect(limiter);
            limiter.connect(audioCtx.destination);

            source.start();
        }
    </script>
</body>
</html>
