<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>After / Without - Live</title>
    <style>
        body { background: #000; color: #444; font-family: monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        button { background: none; border: 1px solid #333; color: #777; padding: 15px; cursor: pointer; font-family: monospace; }
        button:hover { border-color: #666; color: #aaa; }
    </style>
</head>
<body>

    <button id="btn">ACTIVER LA TENUE RÉSIDUELLE</button>
    <p id="status" style="font-size: 10px; margin-top: 20px;">ÉTAT : VEILLE</p>

    <script>
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    let isRunning = false;

    document.getElementById('btn').onclick = function() {
        if (!isRunning) {
            ctx.resume();
            startAfterWithout();
            this.innerText = "COUPER LE SYSTÈME";
            document.getElementById('status').innerText = "ÉTAT : FONCTIONNEMENT RÉSIDUEL";
            isRunning = true;
        } else {
            location.reload(); 
        }
    };

    function startAfterWithout() {
        const whiteNoise = ctx.createBufferSource();
        const bufferSize = 2 * ctx.sampleRate;
        const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 0.005; }
        whiteNoise.buffer = noiseBuffer;
        whiteNoise.loop = true;

        const delay = ctx.createDelay();
        delay.delayTime.value = 0.0022; 
        const feedback = ctx.createGain();
        feedback.gain.value = 0.94; 

        const compressor = ctx.createDynamicsCompressor();
        compressor.threshold.setValueAtTime(-50, ctx.currentTime);
        compressor.ratio.setValueAtTime(12, ctx.currentTime);
        
        const makeUpGain = ctx.createGain();
        makeUpGain.gain.value = 40; 

        whiteNoise.connect(delay);
        delay.connect(feedback);
        feedback.connect(delay); 
        delay.connect(compressor);
        compressor.connect(makeUpGain);
        makeUpGain.connect(ctx.destination);

        whiteNoise.start();
    }
    </script>
</body>
</html>
