<div id="after-without-container">
    <button id="power-btn">ACTIVER LE SYSTÈME (AFTER / WITHOUT)</button>
    <div id="status">ÉTAT : VEILLE HORS-TENSION</div>
</div>

<script>
let audioCtx;
let isRunning = false;

document.getElementById('power-btn').addEventListener('click', function() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    if (!isRunning) {
        startSystem();
        this.innerText = "COUPER LE SYSTÈME";
        document.getElementById('status').innerText = "ÉTAT : FONCTIONNEMENT RÉSIDUEL ACTIF";
        isRunning = true;
    } else {
        audioCtx.close();
        location.reload(); // Réinitialisation propre
    }
});

function startSystem() {
    // 1. Génération du bruit de fond (Le "reste" computationnel)
    const bufferSize = 2 * audioCtx.sampleRate;
    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 0.002; // Signal quasi-nul
    }

    const source = audioCtx.createBufferSource();
    source.buffer = noiseBuffer;
    source.loop = true;

    // 2. Le Résonateur (Bandpass filter à Q élevé)
    const resonator = audioCtx.createBiquadFilter();
    resonator.type = "bandpass";
    resonator.frequency.value = 440; // Fréquence de résonance du système
    resonator.Q.value = 40;

    // 3. L'Erosion (Modulation d'amplitude aléatoire)
    const erosion = audioCtx.createGain();
    const lfo = audioCtx.createOscillator();
    lfo.type = 'sawtooth'; 
    lfo.frequency.value = 8; // Fréquence de l'érosion
    const lfoGain = audioCtx.createGain();
    lfoGain.gain.value = 0.5;
    
    lfo.connect(lfoGain);
    lfoGain.connect(erosion.gain);

    // 4. Amplification Extrême (Le maintien du seuil)
    const massiveGain = audioCtx.createGain();
    massiveGain.gain.value = 60; // On booste le bruit inaudible

    const limiter = audioCtx.createDynamicsCompressor();
    limiter.threshold.setValueAtTime(-10, audioCtx.currentTime);
    limiter.knee.setValueAtTime(40, audioCtx.currentTime);
    limiter.ratio.setValueAtTime(20, audioCtx.currentTime);

    // Routage
    source.connect(resonator);
    resonator.connect(erosion);
    erosion.connect(massiveGain);
    massiveGain.connect(limiter);
    limiter.connect(audioCtx.destination);

    source.start();
    lfo.start();
}
</script>
