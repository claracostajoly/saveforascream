<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>After / Without</title>
    <style>
        body { background: #000; color: #444; font-family: monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; text-transform: uppercase; }
        .header { font-size: 11px; letter-spacing: 2px; margin-bottom: 20px; color: #666; }
        button { background: none; border: 1px solid #333; color: #555; padding: 15px 30px; cursor: pointer; font-family: monospace; transition: 0.2s; z-index: 10; }
        button:hover { border-color: #ff6600; color: #ff6600; }
        #status { font-size: 9px; margin-top: 20px; color: #222; }
    </style>
</head>
<body>

    <div class="header">AFTER / WITHOUT - SIGNAL FLOW</div>

    <button id="btn">[ INITIALIZE SYSTEM ]</button>
    
    <div id="status">STATUS: IDLE</div>

    <script>
    let audioCtx;
    let isRunning = false;

    document.getElementById('btn').addEventListener('click', function() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        if (!isRunning) {
            audioCtx.resume().then(() => {
                runAfterWithout();
                this.innerText = "[ TERMINATE SYSTEM ]";
                document.getElementById('status').innerText = "STATUS: ACTIVE (+40dB GAIN)";
                document.getElementById('status').style.color = "#444";
                isRunning = true;
            });
        } else {
            location.reload(); 
        }
    });

    function runAfterWithout() {
        // 1. SOURCE : BRUIT BLANC (Erosion)
        const bufferSize = 2 * audioCtx.sampleRate;
        const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            output[i] = Math.random() * 0.005; 
        }
        const source = audioCtx.createBufferSource();
        source.buffer = noiseBuffer;
        source.loop = true;

        // 2. RÉSONATEUR : DELAY (Corpus)
        const delay = audioCtx.createDelay();
        delay.delayTime.value = 0.0022; 

        const feedback = audioCtx.createGain();
        feedback.gain.value = 0.95; 

        // 3. CHAINE DE GAIN ET COMPRESSION
        const compressor = audioCtx.createDynamicsCompressor();
        compressor.threshold.setValueAtTime(-50, audioCtx.currentTime);
        compressor.knee.setValueAtTime(40, audioCtx.currentTime);
        compressor.ratio.setValueAtTime(12, audioCtx.currentTime);

        const gainNode = audioCtx.createGain();
        
        // --- CORRECTION DU POP : FADE-IN PROGRESSIF ---
        const now = audioCtx.currentTime;
        gainNode.gain.setValueAtTime(0, now); 
        gainNode.gain.linearRampToValueAtTime(35, now + 1.5); // Monte à 35 en 1.5 seconde

        // ROUTAGE
        source.connect(delay);
        delay.connect(feedback);
        feedback.connect(delay); 
        
        delay.connect(compressor);
        compressor.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        source.start();
    }
    </script>
</body>
</html>
