<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>After / Without</title>
    <style>
        body { background: #000; color: #444; font-family: monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; text-transform: uppercase; }
        .header { font-size: 11px; letter-spacing: 2px; margin-bottom: 20px; color: #666; }
        button { background: none; border: 1px solid #333; color: #555; padding: 15px 30px; cursor: pointer; font-family: monospace; transition: 0.2s; z-index: 10; }
        button:hover { border-color: #ff6600; color: #ff6600; }
        #status { font-size: 9px; margin-top: 20px; color: #222; }
    </style>
</head>
<body>

    <div class="header">AFTER / WITHOUT - SIGNAL FLOW</div>
    <button id="btn">[ INITIALIZE SYSTEM ]</button>
    <div id="status">STATUS: IDLE</div>

    <script>
    let audioCtx;
    let isRunning = false;

    document.getElementById('btn').addEventListener('click', function() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (!isRunning) {
            audioCtx.resume().then(() => {
                runAfterWithout();
                this.innerText = "[ TERMINATE SYSTEM ]";
                document.getElementById('status').innerText = "STATUS: ACTIVE (GRAIN & RESONANCE)";
                isRunning = true;
            });
        } else {
            location.reload(); 
        }
    });

    function runAfterWithout() {
        const now = audioCtx.currentTime;

        // 1. SOURCE : BRUIT PLUS "GRAIN" (On réduit l'amplitude aléatoirement)
        const bufferSize = 2 * audioCtx.sampleRate;
        const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            // Un bruit moins linéaire, plus "digital grit"
            output[i] = (Math.random() * 2 - 1) * (Math.random() > 0.9 ? 0.02 : 0.005); 
        }
        const source = audioCtx.createBufferSource();
        source.buffer = noiseBuffer;
        source.loop = true;

        // 2. FILTRE ANTI-INFRASON (High Pass)
        // C'est ce qui va enlever la pression désagréable dans les basses
        const hpFilter = audioCtx.createBiquadFilter();
        hpFilter.type = "highpass";
        hpFilter.frequency.value = 150; 

        // 3. RÉSONATEUR INSTABLE (Pour éviter l'effet guitare)
        const delay = audioCtx.createDelay();
        delay.delayTime.value = 0.0022; 

        // MODULATION DU DÉLAI (LFO aléatoire pour casser la note fixe)
        const lfo = audioCtx.createOscillator();
        const lfoGain = audioCtx.createGain();
        lfo.type = 'sawtooth'; // Forme d'onde plus agressive pour le grain
        lfo.frequency.value = 8; // Vitesse du grain
        lfoGain.gain.value = 0.0002; 
        lfo.connect(lfoGain);
        lfoGain.connect(delay.delayTime);
        lfo.start();

        const feedback = audioCtx.createGain();
        feedback.gain.value = 0.93; 

        // 4. CHAINE DE SORTIE
        const compressor = audioCtx.createDynamicsCompressor();
        compressor.threshold.setValueAtTime(-40, now);
        compressor.ratio.setValueAtTime(12, now);

        const gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(0, now); 
        gainNode.gain.linearRampToValueAtTime(25, now + 2); // Montée douce

        // ROUTAGE
        source.connect(hpFilter);
        hpFilter.connect(delay);
        delay.connect(feedback);
        feedback.connect(delay); 
        
        delay.connect(compressor);
        compressor.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        source.start();
    }
    </script>
</body>
</html>
