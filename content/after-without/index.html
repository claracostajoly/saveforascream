<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>After / Without - Live</title>
    <style>
        body { background: #000; color: #444; font-family: monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        button { background: none; border: 1px solid #333; color: #777; padding: 15px; cursor: pointer; font-family: monospace; }
        button:hover { border-color: #fff; color: #fff; }
        #status { font-size: 10px; margin-top: 20px; color: #222; }
    </style>
</head>
<body>

    <button id="btn">ACTIVER LE DISPOSITIF</button>
    <div id="status">SYSTÈME EN ATTENTE</div>

    <script>
    let audioCtx;
    let isRunning = false;

    document.getElementById('btn').onclick = function() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        if (!isRunning) {
            audioCtx.resume().then(() => {
                startSystem();
                this.innerText = "COUPER LE SYSTÈME";
                document.getElementById('status').innerText = "TENUE RÉSIDUELLE ACTIVE";
                document.getElementById('status').style.color = "#444";
                isRunning = true;
            });
        } else {
            location.reload(); 
        }
    };

    function startSystem() {
        // 1. Source (Bruit très faible pour simuler l'Erosion)
        const noise = audioCtx.createOscillator();
        noise.type = 'sawtooth'; // Plus riche en harmoniques pour le Corpus
        noise.frequency.value = 50; 
        
        const noiseGain = audioCtx.createGain();
        noiseGain.gain.value = 0.001; // Presque inaudible au départ

        // 2. RÉSONATEUR (Le Corpus de Capture d’écran 2026-05-03 à 22.28.43.jpg)
        const delay = audioCtx.createDelay();
        delay.delayTime.value = 0.005; // Résonance basse/mid
        const feedback = audioCtx.createGain();
        feedback.gain.value = 0.9; // Stable

        // 3. GATE + COMPRESSION (Capture d’écran 2026-05-03 à 22.28.32.jpg)
        const compressor = audioCtx.createDynamicsCompressor();
        compressor.threshold.setValueAtTime(-40, audioCtx.currentTime);
        compressor.knee.setValueAtTime(40, audioCtx.currentTime);
        compressor.ratio.setValueAtTime(12, audioCtx.currentTime);

        // 4. UTILITY (Gain de sortie massif)
        const masterGain = audioCtx.createGain();
        masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
        masterGain.gain.linearRampToValueAtTime(10, audioCtx.currentTime + 2); // Montée progressive pour éviter le POP

        // --- ROUTAGE ---
        noise.connect(noiseGain);
        noiseGain.connect(delay);
        delay.connect(feedback);
        feedback.connect(delay); // Boucle Corpus
        
        delay.connect(compressor);
        compressor.connect(masterGain);
        masterGain.connect(audioCtx.destination);

        noise.start();
    }
    </script>
</body>
</html>
