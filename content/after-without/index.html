<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>After / Without - Live</title>
    <style>
        body { background: #000; color: #333; font-family: monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; text-transform: uppercase; }
        button { background: none; border: 1px solid #222; color: #444; padding: 20px; cursor: pointer; font-family: monospace; transition: 0.4s; letter-spacing: 2px; }
        button:hover { border-color: #ff6600; color: #ff6600; }
        #status { font-size: 9px; margin-top: 20px; color: #111; letter-spacing: 3px; }
    </style>
</head>
<body>

    <button id="btn">[ INITIALIZE SYSTEM ]</button>
    <div id="status">STATUS: STANDBY</div>

    <script>
    let audioCtx;
    let isRunning = false;

    document.getElementById('btn').onclick = function() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (!isRunning) {
            audioCtx.resume().then(() => {
                startAfterWithout();
                this.innerText = "[ TERMINATE ]";
                document.getElementById('status').innerText = "STATUS: ACTIVE (BEAM RESONANCE)";
                isRunning = true;
            });
        } else { location.reload(); }
    };

    function startAfterWithout() {
        const now = audioCtx.currentTime;

        // 1. EROSION (Noise à 300Hz comme sur ta capture)
        const bufferSize = audioCtx.sampleRate * 2;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer; noise.loop = true;

        const noiseFilter = audioCtx.createBiquadFilter();
        noiseFilter.type = "lowpass";
        noiseFilter.frequency.value = 300; // Fréquence Erosion capture 1

        // 2. CORPUS (Mode Beam - Résonance longue)
        // Le mode Beam est simulé par un feedback très élevé et un filtre interne
        const beamDelay = audioCtx.createDelay();
        beamDelay.delayTime.value = 0.0038; // Environ 261Hz (Note C3 sur ta capture)

        const beamFeedback = audioCtx.createGain();
        beamFeedback.gain.value = 0.985; // Decay long (1.32s)

        // 3. REVERB (Diffusion Network sur ta capture 2)
        const reverb = audioCtx.createConvolver(); 
        // Simulation simple de reverb via un delay secondaire pour ne pas alourdir
        const verbDelay = audioCtx.createDelay();
        verbDelay.delayTime.value = 0.09; 
        const verbFeedback = audioCtx.createGain();
        verbFeedback.gain.value = 0.4;

        // 4. COMPRESSOR (+30dB de Makeup Gain !)
        const compressor = audioCtx.createDynamicsCompressor();
        compressor.threshold.setValueAtTime(-50, now);
        compressor.ratio.setValueAtTime(10, now);

        const makeUpGain = audioCtx.createGain();
        makeUpGain.gain.setValueAtTime(0, now);
        // On monte très haut pour simuler le "Out 30.0 dB" de ta capture
        makeUpGain.gain.linearRampToValueAtTime(30, now + 3); 

        // ROUTAGE
        noise.connect(noiseFilter);
        noiseFilter.connect(beamDelay);
        beamDelay.connect(beamFeedback);
        beamFeedback.connect(beamDelay); // Boucle Corpus
        
        beamDelay.connect(verbDelay);
        verbDelay.connect(verbFeedback);
        verbFeedback.connect(verbDelay); // Boucle Reverb
        
        verbDelay.connect(compressor);
        beamDelay.connect(compressor); // Mix Dry/Wet
        
        compressor.connect(makeUpGain);
        makeUpGain.connect(audioCtx.destination);

        noise.start();
    }
    </script>
</body>
</html>
