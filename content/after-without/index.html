<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>After / Without - Final Flow</title>
    <style>
        body { background: #000; color: #1a1a1a; font-family: monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        button { background: none; border: 1px solid #111; color: #333; padding: 20px; cursor: pointer; font-family: monospace; transition: 0.8s; letter-spacing: 5px; }
        button:hover { border-color: #444; color: #999; }
        #status { font-size: 8px; margin-top: 40px; color: #111; letter-spacing: 10px; text-indent: 10px; }
    </style>
</head>
<body>

    <button id="btn">[ INITIALIZE RESIDUAL MASS ]</button>
    <div id="status">VOID_STATE</div>

    <script>
    let audioCtx;
    let isRunning = false;

    document.getElementById('btn').onclick = function() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (!isRunning) {
            audioCtx.resume().then(() => {
                startTheVoid();
                this.innerText = "[ SUSTAINING ]";
                document.getElementById('status').innerText = "SIGNAL_ACTIVE_AT_+30DB";
                isRunning = true;
            });
        } else { location.reload(); }
    };

    function startTheVoid() {
        const now = audioCtx.currentTime;

        // 1. SOURCE : EROSION NOISE (Capture d’écran 2026-05-03 à 23.43.17.jpg)
        // On génère un bruit très dense
        const bufferSize = audioCtx.sampleRate * 4;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
        const source = audioCtx.createBufferSource();
        source.buffer = buffer; source.loop = true;

        const erosionFilter = audioCtx.createBiquadFilter();
        erosionFilter.type = "lowpass";
        erosionFilter.frequency.value = 300; // Calqué sur ton réglage Erosion

        // 2. LA REVERB INFINIE (Capture d’écran 2026-05-03 à 23.43.35.jpg : 20.6s Decay)
        // On simule ce réseau de diffusion avec plusieurs lignes de délais croisées
        const verbGains = [0.03, 0.05, 0.07, 0.11].map(t => {
            const d = audioCtx.createDelay();
            d.delayTime.value = t;
            const f = audioCtx.createGain();
            f.gain.value = 0.92; // Très haut pour le sustain de 20s
            return {d, f};
        });

        // 3. LE COMPRESSEUR +30dB (Capture d’écran 2026-05-03 à 23.43.35.jpg)
        const compressor = audioCtx.createDynamicsCompressor();
        compressor.threshold.setValueAtTime(-50, now);
        compressor.ratio.setValueAtTime(10, now);

        const makeupGain = audioCtx.createGain();
        makeupGain.gain.setValueAtTime(0, now);
        // On explose le gain de sortie pour créer la "nappe massive"
        makeupGain.gain.linearRampToValueAtTime(31.6, now + 5); 

        // --- ROUTAGE ---
        source.connect(erosionFilter);
        
        // Création du réseau de réverbération (Feedback Matrix)
        verbGains.forEach(node => {
            erosionFilter.connect(node.d);
            node.d.connect(node.f);
            node.f.connect(node.d); // Feedback interne
            node.d.connect(compressor);
        });

        compressor.connect(makeupGain);
        makeupGain.connect(audioCtx.destination);

        source.start();
    }
    </script>
</body>
</html>
