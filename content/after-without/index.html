<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>After / Without - Live</title>
    <style>
        body { background: #000; color: #1a1a1a; font-family: monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        button { background: none; border: 1px solid #111; color: #444; padding: 20px; cursor: pointer; font-family: monospace; transition: 0.5s; letter-spacing: 2px; }
        button:hover { border-color: #ff6600; color: #ff6600; }
        #status { font-size: 9px; margin-top: 25px; color: #111; text-transform: uppercase; letter-spacing: 3px; }
    </style>
</head>
<body>

    <button id="btn">INITIALIZE RESIDUAL FLOW</button>
    <div id="status">SYSTEM : STANDBY</div>

    <script>
    let audioCtx;
    let isRunning = false;

    document.getElementById('btn').onclick = function() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (!isRunning) {
            audioCtx.resume().then(() => {
                startSystem();
                this.innerText = "TERMINATE FLOW";
                document.getElementById('status').innerText = "SYSTEM : ACTIVE (NON-HARMONIC)";
                isRunning = true;
            });
        } else { location.reload(); }
    };

    function startSystem() {
        const now = audioCtx.currentTime;

        // 1. SOURCE : BRUIT TYPE "WIDE NOISE" (Erosion)
        const bufferSize = audioCtx.sampleRate * 2;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer; noise.loop = true;

        // 2. FILTRE SOMBRE (Le son étouffé d'After / Without)
        const filter = audioCtx.createBiquadFilter();
        filter.type = "lowpass";
        filter.frequency.value = 900; // On coupe les sifflements de moustique

        // 3. RÉSONATEUR TYPE "PLATE" (Multi-Delay)
        // On utilise 3 délais différents qui ne sont pas accordés entre eux
        const delays = [0.031, 0.047, 0.061].map(t => {
            const d = audioCtx.createDelay();
            d.delayTime.value = t;
            return d;
        });

        const feedback = audioCtx.createGain();
        feedback.gain.value = 0.82; // Feedback modéré pour éviter l'explosion

        // 4. COMPRESSION MASSIVE (Mastering Ableton)
        const compressor = audioCtx.createDynamicsCompressor();
        compressor.threshold.setValueAtTime(-50, now);
        compressor.ratio.setValueAtTime(20, now);

        const masterGain = audioCtx.createGain();
        masterGain.gain.setValueAtTime(0, now);
        masterGain.gain.linearRampToValueAtTime(3.0, now + 4); // Gain puissant mais progressif

        // --- ROUTAGE (Structure en étoile pour casser l'effet corde) ---
        noise.connect(filter);
        
        delays.forEach(d => {
            filter.connect(d);
            d.connect(feedback);
            feedback.connect(d); // Chaque délai boucle sur lui-même
            d.connect(compressor);
        });

        compressor.connect(masterGain);
        masterGain.connect(audioCtx.destination);

        noise.start();
    }
    </script>
</body>
</html>
