<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>All I Had to Do Was Wait</title>

  <style>
    :root{
      --bg:#000;
      --fg:#ccc;
    }

    html,body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size:14px;

      /* ❌ suppression animation */
      /* animation: fadeInSpectral 1.6s ease-out both; */
    }

    main{
      max-width:680px;

      /* ⬇️ images plus basses */
      margin:140px auto 160px;

      padding:0 30px;
    }

    a{
      color:var(--fg);
      text-decoration:none;
    }

    /* 🔻 titre plus discret */
    h1{
      font-size:13px;
      font-weight:400;
      letter-spacing:0.04em;
      margin:0;
      margin-bottom:120px;
      text-align:center;
      opacity:0.6;
    }

    /* ❌ supprimer logique texte animée */
    p{
      display:none;
    }

    figure{
      margin:140px 0; /* ⬇️ plus d’espace entre images */
    }

    figure img{
      width:100%;
      height:auto;
      display:block;
      background:#111;

      /* ❌ suppression effets */
      opacity:1;
      transform:none;
      animation:none;
      transition:none;
    }

    figure:hover img{
      /* ❌ aucun effet au hover */
      opacity:1;
      transform:none;
    }

    .spacer{
      height:0; /* ❌ plus de faux espacements */
    }

  </style>
</head>

<body>
  <main>

    <h1>
      <a href="../../">All I Had to Do Was Wait</a>
    </h1>

    <figure>
      <img src="../assets/images/wait-03.png" alt="">
    </figure>

    <figure>
      <img src="../assets/images/wait-04.png" alt="">
    </figure>

    <figure>
      <img src="../assets/images/wait-02.png" alt="">
    </figure>

  </main>

</body>
</html>
