<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>bmo40_note</title>

  <style>
    :root{
      --bg:#000;
      --fg:#ccc;
      --muted:#888;
    }

    html,body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size:14px;
    }

    main{
      max-width:680px;
      margin:220px auto 160px;
      padding:0 30px;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    h1{
      font-size:clamp(12px,1.6vw,16px);
      font-weight:400;
      letter-spacing:0.02em;
      margin:0;
      margin-bottom:140px;
      text-align:center;
      opacity:0.85;
    }

    p{
      line-height:1.7;
      opacity:0.7;
      margin:0;
      color:var(--muted);
    }

  </style>
</head>

<body>
  <main>

    <!-- retour accueil -->
    <h1>
      <a href="/saveforascream/">All I Had To Do Was Wait_note</a>
    </h1>

    <p>
      waiting here is not narrative but condition.  
      the image does not progress — it persists.  
      time accumulates without transformation.  
      what remains is a suspended state,  
      where nothing happens except duration itself.
    </p>

  </main>

  <script>
    // double clic → retour à l’œuvre
    document.addEventListener("dblclick", () => {
      window.location.href = "/saveforascream/content/all-i-had-to-do-was-wait/";
    });
  </script>

</body>
</html>
