<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>y = y2</title>

<style>
body {
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  background: none;
  border: 1px solid white;
  color: white;
  cursor: pointer;
}

button:hover {
  background: white;
  color: black;
}

.small {
  margin-top: 10px;
  font-size: 12px;
  opacity: 0.6;
  text-align: center;
  max-width: 400px;
}

.meta {
  margin-top: 20px;
  font-size: 11px;
  opacity: 0.4;
  text-align: center;
  max-width: 420px;
}
</style>

</head>
<body>

<div>y = y2</div>

<button onclick="play()">listen</button>

<div class="small">
each state replaces the previous one
</div>

<div class="meta">
each state replaces the previous one
the system runs continuously
it starts from noise
each iteration transforms the signal
each result becomes the next input
the system runs independently
only the current state is accessible
</div>

<audio id="player"></audio>

<script>
function play() {
  const audio = document.getElementById("player");

  audio.src = "./outputs/latest.wav?rand=" + Math.random();

  audio.load();

  audio.play().catch(e => console.log(e));
}
</script>
