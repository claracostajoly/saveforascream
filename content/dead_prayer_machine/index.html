<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>y = y2</title>
<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
button {
  margin-top: 20px;
  padding: 10px 20px;
  background: none;
  border: 1px solid white;
  color: white;
  cursor: pointer;
}
</style>
</head>
<body>

<div>y = y2</div>

<button onclick="play()">listen</button>

<div style="margin-top:10px; font-size:12px; opacity:0.6;">
each state replaces the previous one
</div>

<audio id="player"></audio>

<script>
function play() {
  const audio = document.getElementById("player");

  // recharge à chaque clic (clé)
  audio.src = "outputs/latest.wav?rand=" + Math.random();

  audio.play();
}
</script>

</body>
</html>
