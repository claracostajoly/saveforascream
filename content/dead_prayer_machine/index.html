<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>y = y2</title>

<style>
body {
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  height: 200vh; /* permet le scroll */
  margin: 0;
  padding-top: 120px;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  background: none;
  border: 1px solid white;
  color: white;
  cursor: pointer;
}

button:hover {
  background: white;
  color: black;
}

.small {
  margin-top: 10px;
  font-size: 12px;
  opacity: 0.6;
  text-align: center;
}

/* 🔲 bloc texte */
.meta {
  margin-top: 200px;
  border: 1px solid white;
  padding: 20px;
  max-width: 400px;
  font-size: 12px;
  line-height: 1.6;
  text-align: left;
}

/* animation */
.hidden {
  opacity: 0;
  transform: translateY(40px);
  transition: all 1s ease;
}

.show {
  opacity: 1;
  transform: translateY(0);
}
</style>

</head>
<body>

<div>y = y2</div>

<button onclick="play()">listen</button>

<div class="small">
each state replaces the previous one
</div>

<div id="meta" class="meta hidden">
each state replaces the previous one<br>
the system runs continuously<br>
it starts from noise<br>
each iteration transforms the signal<br>
each result becomes the next input<br>
the system runs independently<br>
only the current state is accessible
</div>

<audio id="player"></audio>

<script>
function play() {
  const audio = document.getElementById("player");
  audio.src = "./outputs/latest.wav?rand=" + Math.random();
  audio.load();
  audio.play().catch(e => console.log(e));
}

/* apparition au scroll */
window.addEventListener("scroll", () => {
  const block = document.getElementById("meta");
  const trigger = window.innerHeight * 0.8;
  const rect = block.getBoundingClientRect();

  if (rect.top < trigger) {
    block.classList.add("show");
  }
});
</script>

</body>
</html>
}
</script>

</body>
</html>
