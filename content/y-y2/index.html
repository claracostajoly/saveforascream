<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>y = y2</title>
    <style>
        body { 
            background: #000; 
            color: #444; 
            font-family: 'Courier New', monospace; 
            font-size: 11px; 
            padding: 30px; 
            margin: 0; 
            text-transform: lowercase; 
            line-height: 1.6;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            overflow: hidden;
            cursor: crosshair;
        }
        .status-container { padding-left: 0; }
        .data { color: #666; }
        audio { display: none; }
        #action-trigger {
            cursor: pointer;
            color: #555;
            text-decoration: none;
            margin-top: 20px;
            display: inline-block;
            transition: color 0.3s;
        }
        #action-trigger:hover { color: #fff; }
        .manifesto { max-width: 400px; color: #222; font-size: 10px; }
        @media (max-width: 768px) { body { padding: 20px; } }
    </style>
</head>
<body>

    <div class="status-container">
        <div class="log">y = y2</div>
        <div class="log">iteration : <span id="iterations" class="data">0</span></div>
        <div class="log">status : <span id="state" class="data">awaiting_link</span></div>
        
        <div id="action-trigger" onclick="toggleAudio()">> open_channel</div>
    </div>

    <audio id="player" loop crossorigin="anonymous"></audio>

    <div class="manifesto">
        y = y2 // every 5 minutes, the system reloads its own residue. 
        the sound is the cumulative error of re-processed silences. 
        it is the computational decay of a void.
    </div>

    <script>
        const player = document.getElementById('player');
        const state = document.getElementById('state');
        const trigger = document.getElementById('action-trigger');
        const iterDisplay = document.getElementById('iterations');
        
        let audioCtx = null;
        let gainNode = null;
        let sourceNode = null;

        // Force la lecture propre du compteur en évitant le cache de GitHub
        function updateCounter() {
            fetch('./outputs/count.txt?t=' + new Date().getTime())
                .then(response => {
                    if (!response.ok) throw new Error();
                    return response.text();
                })
                .then(data => { 
                    const num = data.replace(/[^0-9]/g, ''); // Nettoie les caractères invisibles
                    iterDisplay.innerText = num ? num : "0"; 
                })
                .catch(() => {
                    iterDisplay.innerText = "0";
                });
        }

        updateCounter();

        function initAudioGraph() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            sourceNode = audioCtx.createMediaElementSource(player);
            gainNode = audioCtx.createGain();
            
            // On initialise le volume à 0 sourd
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            
            sourceNode.connect(gainNode);
            gainNode.connect(audioCtx.destination);
        }

        function toggleAudio() {
            if (player.paused) {
                state.innerText = "loading_residue...";
                
                if (!audioCtx) initAudioGraph();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                // L'astuce anti-cache ultime pour briser le pop de buffer de GitHub Pages
                player.src = "./outputs/latest.wav?v=" + new Date().getTime();
                player.load(); 

                player.oncanplaythrough = function() {
                    // Fixation stricte du gain à 0 avant la lecture physique
                    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                    
                    player.play()
                        .then(() => {
                            state.innerText = "streaming_residue";
                            trigger.innerText = "> close_channel";
                            state.style.color = "#aaa";

                            // Fondu d'ouverture très progressif (150ms) pour absorber le choc initial
                            gainNode.gain.linearRampToValueAtTime(0.7, audioCtx.currentTime + 0.15);
                        })
                        .catch(e => {
                            state.innerText = "error_blocked";
                        });
                    player.oncanplaythrough = null;
                };

            } else {
                if (gainNode && audioCtx) {
                    gainNode.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime);
                    gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                }
                
                setTimeout(() => {
                    player.pause();
                    state.innerText = "idle";
                    trigger.innerText = "> open_channel";
                    state.style.color = "#444";
                }, 100);
            }
        }

        // Vérification du compteur toutes les 10 secondes sans recharger la page brutalement
        setInterval(updateCounter, 10000);
        
        // Recharge globale toutes les 5 minutes
        setTimeout(() => { location.reload(); }, 300000);
    </script>
</body>
</html>
