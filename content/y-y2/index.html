<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>y = y2</title>
    <style>
        body { 
            background: #000; 
            color: #444; 
            font-family: 'Courier New', monospace; 
            font-size: 11px; 
            padding: 30px; 
            margin: 0; 
            text-transform: lowercase; 
            line-height: 1.6;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            overflow: hidden;
            cursor: crosshair;
        }

        .status-container {
            padding-left: 0;
        }

        .data { color: #666; }

        audio { display: none; }

        #action-trigger {
            cursor: pointer;
            color: #555;
            text-decoration: none;
            margin-top: 20px;
            display: inline-block;
            transition: color 0.3s;
        }

        #action-trigger:hover { color: #fff; }

        .manifesto {
            max-width: 400px;
            color: #222;
            font-size: 10px;
        }

        @media (max-width: 768px) {
            body { padding: 20px; }
        }
    </style>
</head>
<body ondblclick="window.location.href='note.html'">

    <div class="status-container">
        <div class="log">y = y2</div>
        <div class="log">iteration : <span id="iterations" class="data">...</span></div>
        <div class="log">status : <span id="state" class="data">awaiting_link</span></div>
        
        <div id="action-trigger" onclick="toggleAudio()">> open_channel</div>
    </div>

    <audio id="player" loop>
        <source id="audio-source" src="outputs/latest.wav" type="audio/wav">
    </audio>

    <div class="manifesto">
        y = y2 // every 5 minutes, the system reloads its own residue. 
        the sound is the cumulative error of re-processed silences. 
        it is the computational decay of a void.
    </div>

    <script>
        const player = document.getElementById('player');
        const state = document.getElementById('state');
        const trigger = document.getElementById('action-trigger');
        const iterDisplay = document.getElementById('iterations');

        // Charger le nombre d'itérations depuis le fichier texte
        fetch('outputs/count.txt')
            .then(response => response.text())
            .then(data => {
                iterDisplay.innerText = data.trim();
            })
            .catch(() => iterDisplay.innerText = "1");

        function toggleAudio() {
            if (player.paused) {
                state.innerText = "loading_residue...";
                state.style.color = "#666";

                // 1. Applique la nouvelle source avec le timestamp anti-cache
                player.src = "outputs/latest.wav?v=" + new Date().getTime();
                
                // 2. Force le rechargement du player avec le nouveau fichier
                player.load(); 

                // 3. Attend que le fichier soit chargé avant d'ordonner la lecture
                player.oncanplaythrough = function() {
                    player.play()
                        .then(() => {
                            state.innerText = "streaming_residue";
                            trigger.innerText = "> close_channel";
                            state.style.color = "#aaa";
                        })
                        .catch(e => {
                            console.error("Erreur de lecture : ", e);
                            state.innerText = "error_blocked";
                        });
                    // Nettoyage de l'événement
                    player.oncanplaythrough = null;
                };

            } else {
                player.pause();
                state.innerText = "idle";
                trigger.innerText = "> open_channel";
                state.style.color = "#444";
            }
        }

        // Recharge la page toutes les 5 minutes
        setTimeout(() => { location.reload(); }, 300000);
    </script>
</body>
</html>
