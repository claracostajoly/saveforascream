<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>y = y2</title>
    <style>
        body { 
            background: #000; 
            color: #444; 
            font-family: 'Courier New', monospace; 
            font-size: 11px; 
            padding: 30px; 
            margin: 0; 
            text-transform: lowercase; 
            line-height: 1.6;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            overflow: hidden;
            cursor: crosshair;
        }
        .status-container { padding-left: 0; }
        .data { color: #666; }
        #action-trigger {
            cursor: pointer;
            color: #555;
            text-decoration: none;
            margin-top: 20px;
            display: inline-block;
            transition: color 0.3s;
        }
        #action-trigger:hover { color: #fff; }
        .manifesto { max-width: 400px; color: #222; font-size: 10px; }
        @media (max-width: 768px) { body { padding: 20px; } }
    </style>
</head>
<body>

    <div class="status-container">
        <div class="log">y = y2</div>
        <div class="log">iteration : <span id="iterations" class="data">0</span></div>
        <div class="log">status : <span id="state" class="data">awaiting_link</span></div>
        
        <div id="action-trigger" onclick="toggleAudio()">> open_channel</div>
    </div>

    <div class="manifesto">
        y = y2 // every 5 minutes, the system reloads its own residue. 
        the sound is the cumulative error of re-processed silences. 
        it is the computational decay of a void.
    </div>

    <script>
        const state = document.getElementById('state');
        const trigger = document.getElementById('action-trigger');
        const iterDisplay = document.getElementById('iterations');
        
        let audioCtx = null;
        let gainNode = null;
        let filterNode = null;
        let audioBuffer = null;
        let sourceNode = null;
        let isPlaying = false;

        function updateCounter() {
            fetch('./outputs/count.txt?t=' + new Date().getTime())
                .then(response => response.ok ? response.text() : "0")
                .then(data => { 
                    iterDisplay.innerText = data.replace(/[^0-9]/g, '') || "0"; 
                })
                .catch(() => iterDisplay.innerText = "0");
        }

        updateCounter();
        setInterval(updateCounter, 10000);

        async function loadAudioFile() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                filterNode = audioCtx.createBiquadFilter();
                filterNode.type = 'lowpass';
                filterNode.frequency.setValueAtTime(800, audioCtx.currentTime); // Coupe haut pour garder uniquement la lourdeur sourde

                gainNode = audioCtx.createGain();
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);

                filterNode.connect(gainNode);
                gainNode.connect(audioCtx.destination);
            }

            const response = await fetch("./outputs/latest.wav?v=" + new Date().getTime());
            const arrayBuffer = await response.arrayBuffer();
            audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        }

        async function toggleAudio() {
            if (!isPlaying) {
                state.innerText = "loading_residue...";
                try {
                    await loadAudioFile();
                    if (audioCtx.state === 'suspended') await audioCtx.resume();

                    sourceNode = audioCtx.createBufferSource();
                    sourceNode.buffer = audioBuffer;
                    sourceNode.loop = true;
                    sourceNode.connect(filterNode);

                    // Assure que le volume démarre à zéro absolu avant le début physique
                    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                    sourceNode.start(0);
                    
                    // Rampe progressive de 200ms pour ouvrir le canal en douceur
                    gainNode.gain.linearRampToValueAtTime(0.6, audioCtx.currentTime + 0.2);

                    state.innerText = "streaming_residue";
                    trigger.innerText = "> close_channel";
                    state.style.color = "#aaa";
                    isPlaying = true;
                } catch (e) {
                    console.error(e);
                    state.innerText = "error_corrupted_frame";
                }
            } else {
                if (gainNode) {
                    gainNode.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime);
                    gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                }
                setTimeout(() => {
                    if (sourceNode) sourceNode.stop();
                    state.innerText = "idle";
                    trigger.innerText = "> open_channel";
                    state.style.color = "#444";
                    isPlaying = false;
                }, 210);
            }
        }

        setTimeout(() => { location.reload(); }, 300000);
    </script>
</body>
</html>
