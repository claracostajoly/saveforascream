<script>
    const player = document.getElementById('player');
    const state = document.getElementById('state');
    const trigger = document.getElementById('action-trigger');
    const iterDisplay = document.getElementById('iterations');

    // Charger le nombre d'itérations depuis le fichier texte
    fetch('outputs/count.txt')
        .then(response => response.text())
        .then(data => {
            iterDisplay.innerText = data.trim();
        })
        .catch(() => iterDisplay.innerText = "1");

    function toggleAudio() {
        if (player.paused) {
            state.innerText = "loading_residue...";
            state.style.color = "#666";

            // 1. On applique la nouvelle source avec le timestamp anti-cache
            player.src = "outputs/latest.wav?v=" + new Date().getTime();
            
            // 2. On force le rechargement de la nouvelle source
            player.load(); 

            // 3. On attend que le navigateur ait chargé assez de données pour lire
            player.oncanplaythrough = function() {
                player.play()
                    .then(() => {
                        state.innerText = "streaming_residue";
                        trigger.innerText = "> close_channel";
                        state.style.color = "#aaa";
                    })
                    .catch(e => {
                        console.error("Erreur de lecture : ", e);
                        state.innerText = "error_blocked";
                    });
                // On nettoie l'événement pour éviter qu'il ne se redéclenche inutilement
                player.oncanplaythrough = null;
            };

        } else {
            player.pause();
            state.innerText = "idle";
            trigger.innerText = "> open_channel";
            state.style.color = "#444";
        }
    }

    // Recharge la page toutes les 5 minutes (300000ms)
    setTimeout(() => { location.reload(); }, 300000);
</script>
