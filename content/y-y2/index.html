<script>
    const player = document.getElementById('player');
    const state = document.getElementById('state');
    const trigger = document.getElementById('action-trigger');
    const iterDisplay = document.getElementById('iterations');
    
    let audioCtx = null;
    let gainNode = null;
    let filterNode = null;
    let sourceNode = null;

    // Charger le compteur
    fetch('outputs/count.txt')
        .then(response => response.text())
        .then(data => { iterDisplay.innerText = data.trim(); })
        .catch(() => iterDisplay.innerText = "1");

    function initAudioGraph() {
        // Crée le moteur audio global
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Relie le player HTML au moteur audio
        sourceNode = audioCtx.createMediaElementSource(player);
        
        // Crée un filtre pour donner de la texture (chaleur analogique)
        filterNode = audioCtx.createBiquadFilter();
        filterNode.type = 'lowpass';
        filterNode.frequency.setValueAtTime(1200, audioCtx.currentTime); // Coupe les aigus agressifs
        filterNode.Q.setValueAtTime(1, audioCtx.currentTime);            // Donne de la résonance au vide

        // Crée le gestionnaire de volume (pour éviter le pop)
        gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(0, audioCtx.currentTime); // Commence à zéro absolu

        // Connexion du circuit : Player -> Filtre -> Volume -> Haut-parleurs
        sourceNode.connect(filterNode);
        filterNode.connect(gainNode);
        gainNode.connect(audioCtx.destination);
    }

    function toggleAudio() {
        if (player.paused) {
            state.innerText = "loading_residue...";
            
            if (!audioCtx) initAudioGraph();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            player.src = "outputs/latest.wav?v=" + new Date().getTime();
            player.load(); 

            player.oncanplaythrough = function() {
                player.play()
                    .then(() => {
                        state.innerText = "streaming_residue";
                        trigger.innerText = "> close_channel";
                        state.style.color = "#aaa";

                        // ANTI-POP & TEXTURE EVO : 
                        // On monte le volume progressivement sur 0.05 seconde (FADE IN)
                        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                        gainNode.gain.linearRampToValueAtTime(0.8, audioCtx.currentTime + 0.05);
                    })
                    .catch(e => {
                        state.innerText = "error_blocked";
                    });
                player.oncanplaythrough = null;
            };

        } else {
            // FADE OUT : On baisse le son doucement avant de couper pour éviter le pop de fermeture
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
            
            setTimeout(() => {
                player.pause();
                state.innerText = "idle";
                trigger.innerText = "> open_channel";
                state.style.color = "#444";
            }, 50); // Attend la fin du fondu avant de faire pause
        }
    }

    setTimeout(() => { location.reload(); }, 300000);
</script>
