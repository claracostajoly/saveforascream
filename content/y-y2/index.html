<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>y = y2</title>
    <style>
        body { 
            background: #000; 
            color: #444; 
            font-family: 'Courier New', monospace; 
            font-size: 11px; 
            padding: 30px; 
            margin: 0; 
            text-transform: lowercase; 
            line-height: 1.6;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            overflow: hidden;
            cursor: crosshair;
        }

        .status-container {
            padding-left: 0;
        }

        .data { color: #666; }

        audio { display: none; }

        #action-trigger {
            cursor: pointer;
            color: #555;
            text-decoration: none;
            margin-top: 20px;
            display: inline-block;
            transition: color 0.3s;
        }

        #action-trigger:hover { color: #fff; }

        .manifesto {
            max-width: 400px;
            color: #222;
            font-size: 10px;
        }

        @media (max-width: 768px) {
            body { padding: 20px; }
        }
    </style>
</head>
<body ondblclick="window.location.href='note.html'">

    <div class="status-container">
        <div class="log">y = y2</div>
        <div class="log">iteration : <span id="iterations" class="data">...</span></div>
        <div class="log">status : <span id="state" class="data">awaiting_link</span></div>
        
        <div id="action-trigger" onclick="toggleAudio()">> open_channel</div>
    </div>

    <audio id="player" loop></audio>

    <div class="manifesto">
        y = y2 // every 5 minutes, the system reloads its own residue. 
        the sound is the cumulative error of re-processed silences. 
        it is the computational decay of a void.
    </div>

    <script>
        const player = document.getElementById('player');
        const state = document.getElementById('state');
        const trigger = document.getElementById('action-trigger');
        const iterDisplay = document.getElementById('iterations');
        
        let audioCtx = null;
        let gainNode = null;
        let filterNode = null;
        let sourceNode = null;

        // Charger le compteur d'itérations
        fetch('outputs/count.txt')
            .then(response => response.text())
            .then(data => { 
                iterDisplay.innerText = data.trim(); 
            })
            .catch(() => {
                iterDisplay.innerText = "1";
            });

        function initAudioGraph() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            sourceNode = audioCtx.createMediaElementSource(player);
            
            // Texture : Filtre analogique sourd
            filterNode = audioCtx.createBiquadFilter();
            filterNode.type = 'lowpass';
            filterNode.frequency.setValueAtTime(1200, audioCtx.currentTime);
            filterNode.Q.setValueAtTime(1, audioCtx.currentTime);

            // Anti-pop : Gestion du volume progressive
            gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);

            // Connexion des modules
            sourceNode.connect(filterNode);
            filterNode.connect(gainNode);
            gainNode.connect(audioCtx.destination);
        }

        function toggleAudio() {
            if (player.paused) {
                state.innerText = "loading_residue...";
                state.style.color = "#666";
                
                if (!audioCtx) initAudioGraph();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                player.src = "outputs/latest.wav?v=" + new Date().getTime();
                player.load(); 

                player.oncanplaythrough = function() {
                    player.play()
                        .then(() => {
                            state.innerText = "streaming_residue";
                            trigger.innerText = "> close_channel";
                            state.style.color = "#aaa";

                            // Fondu d'ouverture anti-pop (0.05 seconde)
                            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                            gainNode.gain.linearRampToValueAtTime(0.8, audioCtx.currentTime + 0.05);
                        })
                        .catch(e => {
                            console.error(e);
                            state.innerText = "error_blocked";
                        });
                    player.oncanplaythrough = null;
                };

            } else {
                // Fondu de fermeture anti-pop
                if (gainNode) {
                    gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
                }
                
                setTimeout(() => {
                    player.pause();
                    state.innerText = "idle";
                    trigger.innerText = "> open_channel";
                    state.style.color = "#444";
                }, 50);
            }
        }

        setTimeout(() => { location.reload(); }, 300000);
    </script>
</body>
</html>
