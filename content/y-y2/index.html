<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>y = y2</title>
    <style>
        body { 
            background: #000; 
            color: #444; 
            font-family: 'Courier New', monospace; 
            font-size: 11px; 
            padding: 30px; 
            margin: 0; 
            text-transform: lowercase; 
            line-height: 1.6;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            box-sizing: border-box;
            overflow: hidden;
            cursor: crosshair;
        }
        .status-container { padding-left: 0; }
        .data { color: #666; }
        #action-trigger {
            cursor: pointer;
            color: #555;
            text-decoration: none;
            margin-top: 20px;
            display: inline-block;
            transition: color 0.3s;
        }
        #action-trigger:hover { color: #fff; }
        @media (max-width: 768px) { body { padding: 20px; } }
    </style>
</head>
<body>

    <div class="status-container">
        <div class="log">y = y2</div>
        <div class="log">iteration : <span id="iterations" class="data">0</span></div>
        <div class="log">status : <span id="state" class="data">idle</span></div>
        
        <div id="action-trigger" onclick="toggleAudio()">> open_channel</div>
    </div>

    <script>
        const state = document.getElementById('state');
        const trigger = document.getElementById('action-trigger');
        const iterDisplay = document.getElementById('iterations');
        
        let audioCtx = null;
        let gainNode = null;
        let filterNode = null;
        let noiseSource = null;
        let isPlaying = false;
        let currentIteration = 0;

        // NAVIGATION COMPATIBLE MULTI-CLIC & TOUCH (Exclut le bouton open_channel)
        let clickTimer = null;
        document.addEventListener('click', (e) => {
            if (e.target.id === 'action-trigger') return;
            if (clickTimer === null) {
                clickTimer = setTimeout(() => {
                    clickTimer = null;
                    window.history.back(); // 1 CLIC : Retour arrière
                }, 300);
            } else {
                clearTimeout(clickTimer);
                clickTimer = null;
                window.location.href = "note.html"; // 2 CLICS : Vers le texte
            }
        });

        let lastTap = 0;
        document.addEventListener('touchend', (e) => {
            if (e.target.id === 'action-trigger') return;
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 300 && tapLength > 0) {
                window.location.href = "note.html"; // DOUBLE TAP MOBILE : Vers le texte
            }
            lastTap = currentTime;
        });

        function updateCounter() {
            fetch('./outputs/count.txt?t=' + new Date().getTime())
                .then(response => response.ok ? response.text() : "1")
                .then(data => { 
                    const num = parseInt(data.replace(/[^0-9]/g, ''), 10);
                    currentIteration = isNaN(num) ? 1 : num;
                    iterDisplay.innerText = currentIteration;
                    
                    if (isPlaying && filterNode) {
                        adjustTexture();
                    }
                })
                .catch(() => {
                    iterDisplay.innerText = "1";
                });
        }

        updateCounter();
        setInterval(updateCounter, 10000);

        function createNoiseBuffer() {
            const bufferSize = 2 * audioCtx.sampleRate;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }
            return noiseBuffer;
        }

        function adjustTexture() {
            const baseFreq = 900;
            const targetFreq = Math.max(150, baseFreq - (currentIteration * 8));
            filterNode.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.5);
            
            const baseGain = 0.15;
            const targetGain = Math.min(0.4, baseGain + (currentIteration * 0.005));
            gainNode.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.2);
        }

        function toggleAudio() {
            if (!isPlaying) {
                state.innerText = "loading_residue...";
                
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    filterNode = audioCtx.createBiquadFilter();
                    filterNode.type = 'lowpass';
                    filterNode.Q.setValueAtTime(2.0, audioCtx.currentTime);

                    gainNode = audioCtx.createGain();
                    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);

                    filterNode.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                }

                if (audioCtx.state === 'suspended') audioCtx.resume();

                noiseSource = audioCtx.createBufferSource();
                noiseSource.buffer = createNoiseBuffer();
                noiseSource.loop = true;
                noiseSource.connect(filterNode);

                adjustTexture();
                
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                noiseSource.start(0);
                
                const baseGain = 0.15;
                const targetGain = Math.min(0.4, baseGain + (currentIteration * 0.005));
                gainNode.gain.linearRampToValueAtTime(targetGain, audioCtx.currentTime + 0.3);

                state.innerText = "streaming_residue";
                trigger.innerText = "> close_channel";
                state.style.color = "#aaa";
                isPlaying = true;
            } else {
                if (gainNode) {
                    gainNode.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime);
                    gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                }
                setTimeout(() => {
                    if (noiseSource) noiseSource.stop();
                    state.innerText = "idle";
                    trigger.innerText = "> open_channel";
                    state.style.color = "#444";
                    isPlaying = false;
                }, 210);
            }
        }

        setTimeout(() => { location.reload(); }, 300000);
    </script>
</body>
</html>
