<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>notes</title>

<style>
:root{
  --bg:#000;
  --fg:#ddd;
  --muted:#777;
}

html,body{
  margin:0;
  background:var(--bg);
  color:var(--fg);
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size:14px;
}

main{
  max-width:680px;
  margin:220px auto 160px;
  padding:0 30px;
}

h1{
  font-size:clamp(12px,1.6vw,16px);
  font-weight:400;
  letter-spacing:0.02em;
  margin:0 0 140px;
  text-align:center;
  opacity:0.6;
}

p{
  line-height:1.7;
  opacity:0.75;
  color:var(--muted);
}
</style>
</head>

<body>
<main>

<h1>work_note</h1>

<p>
this work operates as a minimal condition.<br>
no event is produced.<br>
the system maintains a state rather than generating a sequence.<br><br>

what appears is not content but persistence.<br>
a form held in continuous transformation.
</p>

</main>

<script>
// double click → retour œuvre
document.addEventListener("dblclick", () => {
  window.location.href = "./";
});
</script>

</body>
</html>
