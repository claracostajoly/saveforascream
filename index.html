<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>saveforascream</title>
  <style>
    :root { 
      --bg: #000; 
      --text-color: #bbb; 
      --muted: #555; 
    }

    html, body {
      height: 100%; margin: 0;
      background: var(--bg); color: var(--text-color);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }

    a { color: inherit; text-decoration: none; }

    #titre {
      position: fixed; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px; font-weight: 400;
      letter-spacing: .05em; white-space: nowrap;
      cursor: pointer; user-select: none; z-index: 10;
      color: var(--text-color);
      transition: opacity 0.3s ease; opacity: 0.8;
    }

    #titre:hover { opacity: 1; }

    #row {
      position: fixed; inset: 0;
      visibility: hidden; opacity: 0;
      transition: opacity .25s ease; z-index: 1;
      pointer-events: none;
    }
    #row.shown { visibility: visible; opacity: 1; }

    .entry {
      position: absolute; font-size: 14px; font-weight: 400;
      white-space: nowrap; opacity: .6;
      transition: opacity .2s ease, transform .25s ease;
      padding: .1rem .2rem; pointer-events: auto;
      color: var(--text-color);
      /* text-transform: lowercase supprimé pour voir les majuscules */
    }
    
    .entry:hover { opacity: 1; }

    .admin {
      position: fixed; right: 14px; bottom: 10px;
      font-size: 11px; color: var(--muted); z-index: 11;
    }
  </style>
</head>
<body>
  <div id="titre">saveforascream</div>
  <div id="row" aria-live="polite"></div>
  <a class="admin" href="admin.html">admin</a>

  <script>
    const JSON_PATH = 'content/index.json';
    const titre = document.getElementById('titre');
    const row = document.getElementById('row');

    let works = [];
    let shown = false;

    function rand(min, max) { return Math.random() * (max - min) + min; }

    function scatter() {
      const entries = Array.from(row.children);
      if (!entries.length) return;

      const W = window.innerWidth;
      const H = window.innerHeight;
      const margin = 60;
      const tRect = titre.getBoundingClientRect();
      const pad = 60;
      const forbid = {
        left: tRect.left - pad, right: tRect.right + pad,
        top: tRect.top - pad, bottom: tRect.bottom + pad
      };

      const usedY = [];
      const minYSpacing = 35;

      entries.forEach(el => {
        const w = el.offsetWidth || 80;
        const h = el.offsetHeight || 20;
        let x, y, tries = 0;
        while (true) {
          x = rand(margin, W - w - margin);
          y = rand(margin, H - h - margin);
          const overlapTitle = !(x + w < forbid.left || x > forbid.right || y + h < forbid.top || y > forbid.bottom);
          if (overlapTitle && tries < 50) { tries++; continue; }
          let tooCloseY = false;
          for (const yUsed of usedY) {
            if (Math.abs(y - yUsed) < minYSpacing) { tooCloseY = true; break; }
          }
          if (tooCloseY && tries < 80) { tries++; continue; }
          usedY.push(y);
          break;
        }
        el.style.transform = `translate(${x}px, ${y}px)`;
      });
    }

    function buildEntries() {
      row.innerHTML = '';
      works.forEach(it => {
        const a = document.createElement('a');
        a.className = 'entry';
        a.textContent = it.title;
        a.href = it.path;
        row.appendChild(a);
      });
    }

    titre.addEventListener('click', () => {
      if (!works.length) return;
      if (!shown) {
        buildEntries();
        row.classList.add('shown');
        shown = true;
      }
      requestAnimationFrame(scatter);
    });

    window.addEventListener('resize', () => { if (shown) scatter(); });

    // Chargement du JSON avec correction du cache
    fetch(JSON_PATH + '?_=(new Date()).getTime()')
      .then(r => r.json())
      .then(list => { works = list; })
      .catch(err => { console.error("Erreur JSON:", err); });
  </script>
</body>
</html>
